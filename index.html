function useSave(key, init) {
  const [v, setV] = useState(init);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const r = firebase.database().ref(key);
    r.on('value', snap => {
      if (snap.exists()) {
        const val = snap.val();
        setV(Array.isArray(init) ? Object.values(val) : val);
      } else {
        r.set(Array.isArray(init)
          ? Object.fromEntries(init.map((x,i)=>[i,x]))
          : init);
        setV(init);
      }
      setReady(true);
    });
    return () => r.off();
  }, [key]);
  const save = (nv) => {
    const val = typeof nv === "function" ? nv(v) : nv;
    setV(val);
    firebase.database().ref(key).set(
      Array.isArray(val)
        ? Object.fromEntries(val.map((x,i)=>[i,x]))
        : val
    );
  };
  return [v, save, ready];
}

function calcTable(teams,matches){
  const t=teams.map(x=>({...x,mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0,yc:0,rc:0,form:[]}));
  matches.filter(m=>m.st==="จบแล้ว"&&m.hs!=null).forEach(m=>{
    const h=t.find(x=>x.id===m.h),a=t.find(x=>x.id===m.a);
    if(!h||!a)return;
    h.mp++;a.mp++;h.gf+=m.hs;h.ga+=m.as;a.gf+=m.as;a.ga+=m.hs;
    if(m.hs>m.as){h.w++;h.pts+=3;a.l++;h.form.push("W");a.form.push("L");}
    else if(m.hs<m.as){a.w++;a.pts+=3;h.l++;h.form.push("L");a.form.push("W");}
    else{h.d++;h.pts++;a.d++;a.pts++;h.form.push("D");a.form.push("D");}
    m.yc?.forEach(c=>{const x=t.find(y=>y.id===c.team);if(x)x.yc++;});
    m.rc?.forEach(c=>{const x=t.find(y=>y.id===c.team);if(x)x.rc++;});
  });
  t.forEach(x=>x.gd=x.gf-x.ga);
  return t.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

function Live(){
  const [v,setV]=useState(true);
  useEffect(()=>{const t=setInterval(()=>setV(x=>!x),800);return()=>clearInterval(t);},[]);
  return <span style={{background:"#dc2626",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:4,opacity:v?1:0.3,transition:"opacity 0.3s"}}>LIVE</span>;
}

function Banner({banners}){
  const [i,setI]=useState(0);
  const on=banners.filter(b=>b.on);
  useEffect(()=>{if(!on.length)return;const t=setInterval(()=>setI(x=>(x+1)%on.length),3500);return()=>clearInterval(t);},[on.length]);
  if(!on.length)return null;
  return(
    <div style={{background:"#0f172a",position:"relative"}}>
      <img src={on[i].url} alt={on[i].name} style={{width:"100%",maxHeight:80,objectFit:"cover",display:"block"}} onError={e=>{e.target.style.minHeight="40px";e.target.style.background="#1e293b";}}/>
      <div style={{position:"absolute",bottom:5,right:8,display:"flex",gap:4}}>
        {on.map((_,j)=><div key={j} onClick={()=>setI(j)} style={{width:5,height:5,borderRadius:"50%",background:i===j?"#f59e0b":"#475569",cursor:"pointer"}}/>)}
      </div>
    </div>
  );
}

// ── ADMIN ──
function AdminMatches({teams,matches,setMatches,confirm}){
  const EF={h:"",a:"",d:"",t:"17:00",v:V,st:"กำหนดการ",url:""};
  const [f,setF]=useState(EF);
  const [eid,setEid]=useState(null);
  const [live,setLive]=useState(null);
  const [eform,setEform]=useState({type:"",player:"",side:"home",min:""});
  const inp={background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 10px",color:"#f1f5f9",fontSize:12,outline:"none",width:"100%",boxSizing:"border-box"};
  const btn=(bg,c="#fff")=>({background:bg,color:c,border:"none",borderRadius:8,padding:"7px 12px",fontWeight:700,cursor:"pointer",fontSize:12});
  const save=()=>{
    if(!f.h||!f.a||!f.d)return alert("กรุณากรอกข้อมูลให้ครบ");
    if(eid){setMatches(p=>p.map(m=>m.id===eid?{...m,...f,h:+f.h,a:+f.a}:m));setEid(null);}
    else setMatches(p=>[...p,{id:Date.now(),...f,h:+f.h,a:+f.a,hs:null,as:null,sc:[],yc:[],rc:[]}]);
    setF(EF);
  };
  const submitEvent=()=>{
    if(!live||!eform.player.trim())return;
    const tid=eform.side==="home"?live.h:live.a;
    const min=parseInt(eform.min)||0;
    if(eform.type==="goal"){
      const sc=[...(live.sc||[]),{team:tid,player:eform.player.trim(),min}];
      setLive({...live,sc,hs:sc.filter(s=>s.team===live.h).length,as:sc.filter(s=>s.team===live.a).length});
    } else if(eform.type==="yellow"){
      setLive({...live,yc:[...(live.yc||[]),{team:tid,player:eform.player.trim(),min}]});
    } else if(eform.type==="red"){
      setLive({...live,rc:[...(live.rc||[]),{team:tid,player:eform.player.trim(),min}]});
    }
    setEform({type:"",player:"",side:"home",min:""});
  };
  const saveLive=()=>{setMatches(p=>p.map(m=>m.id===live.id?{...live,st:"จบแล้ว"}:m));setLive(null);};
  return(
    <div style={{padding:12}}>
      <div style={{color:"#f59e0b",fontSize:14,fontWeight:700,marginBottom:12}}>📅 จัดการแมตช์</div>
      <div style={{background:"#1e293b",borderRadius:12,padding:12,marginBottom:12}}>
        <div style={{color:"#94a3b8",fontSize:12,fontWeight:600,marginBottom:8}}>{eid?"✏️ แก้ไข":"➕ สร้างแมตช์ใหม่"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["ทีมเจ้าบ้าน","h"],["ทีมเยือน","a"]].map(([label,key])=>(
            <div key={key}>
              <div style={{color:"#64748b",fontSize:10,marginBottom:3}}>{label}</div>
              <select value={f[key]} onChange={e=>setF({...f,[key]:e.target.value})} style={inp}>
                <option value="">-- เลือก --</option>
                {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
            </div>
          ))}
          <div><div style={{color:"#64748b",fontSize:10,marginBottom:3}}>วันที่</div><input type="date" value={f.d} onChange={e=>setF({...f,d:e.target.value})} style={inp}/></div>
          <div><div style={{color:"#64748b",fontSize:10,marginBottom:3}}>เวลา</div><input type="time" value={f.t} onChange={e=>setF({...f,t:e.target.value})} style={inp}/></div>
          <div style={{gridColumn:"1/-1"}}><div style={{color:"#64748b",fontSize:10,marginBottom:3}}>สนาม</div><input value={f.v} onChange={e=>setF({...f,v:e.target.value})} style={inp}/></div>
          <div style={{gridColumn:"1/-1"}}>
            <div style={{color:"#64748b",fontSize:10,marginBottom:3}}>YouTube ID (ถ่ายทอดสด)</div>
            <input value={f.url} onChange={e=>setF({...f,url:e.target.value})} placeholder="Video ID 11 ตัว" style={inp}/>
            {f.url&&/^[A-Za-z0-9_-]{11}$/.test(f.url.trim())&&(
              <div style={{marginTop:5,display:"flex",alignItems:"center",gap:8}}>
                <img src={`https://img.youtube.com/vi/${f.url.trim()}/default.jpg`} style={{width:60,height:45,borderRadius:5,objectFit:"cover"}}/>
                <span style={{color:"#86efac",fontSize:11}}>✅ ID: {f.url.trim()}</span>
              </div>
            )}
          </div>
          <div style={{gridColumn:"1/-1"}}><div style={{color:"#64748b",fontSize:10,marginBottom:3}}>สถานะ</div>
            <select value={f.st} onChange={e=>setF({...f,st:e.target.value})} style={inp}>
              {["กำหนดการ","กำลังแข่ง","จบแล้ว","เลื่อน","ยกเลิก"].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button onClick={save} style={btn("#059669")}>{eid?"💾 บันทึก":"➕ สร้าง"}</button>
          {eid&&<button onClick={()=>{setEid(null);setF(EF);}} style={btn("#6b7280")}>ยกเลิก</button>}
        </div>
      </div>
      {live&&(
        <div style={{background:"#7f1d1d",borderRadius:12,padding:12,marginBottom:12,border:"1px solid #dc2626"}}>
          <div style={{color:"#fca5a5",fontWeight:700,fontSize:13,marginBottom:4}}>
            LIVE: {gt(teams,live.h)?.name} vs {gt(teams,live.a)?.name}
          </div>
          <div style={{fontSize:30,fontWeight:900,textAlign:"center",color:"#fff",letterSpacing:5,marginBottom:10}}>{live.hs??0} - {live.as??0}</div>

          {/* Event form */}
          <div style={{background:"#00000033",borderRadius:10,padding:10,marginBottom:10}}>
            {/* Type selector */}
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {[["goal","⚽ ประตู","#059669"],["yellow","🟨 เหลือง","#d97706"],["red","🟥 ใบแดง","#dc2626"]].map(([type,label,bg])=>(
                <button key={type} onClick={()=>setEform(p=>({...p,type:p.type===type?"":type}))}
                  style={{flex:1,background:eform.type===type?bg:"#334155",color:"#fff",border:"none",borderRadius:7,padding:"7px 4px",fontWeight:700,cursor:"pointer",fontSize:11}}>
                  {label}
                </button>
              ))}
            </div>

            {eform.type&&(
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {/* Team selector */}
                <div style={{display:"flex",gap:6}}>
                  {[["home",gt(teams,live.h)?.name],["away",gt(teams,live.a)?.name]].map(([side,name])=>(
                    <button key={side} onClick={()=>setEform(p=>({...p,side}))}
                      style={{flex:1,background:eform.side===side?"#1e40af":"#334155",color:"#fff",border:"none",borderRadius:7,padding:"7px 4px",fontWeight:700,cursor:"pointer",fontSize:11}}>
                      {name}
                    </button>
                  ))}
                </div>
                {/* Player name */}
                <input
                  value={eform.player}
                  onChange={e=>setEform(p=>({...p,player:e.target.value}))}
                  placeholder="ชื่อผู้เล่น"
                  style={{...inp,background:"#1e293b"}}
                />
                {/* Minute */}
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input
                    type="number" min="0" max="120"
                    value={eform.min}
                    onChange={e=>setEform(p=>({...p,min:e.target.value}))}
                    placeholder="นาที"
                    style={{...inp,width:80,background:"#1e293b"}}
                  />
                  <button onClick={submitEvent}
                    style={{flex:1,background:"#f59e0b",color:"#0f172a",border:"none",borderRadius:8,padding:"9px 0",fontWeight:800,cursor:"pointer",fontSize:13}}>
                    ✅ บันทึกเหตุการณ์
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* Events log */}
          {live.sc?.length>0&&(
            <div style={{marginBottom:6}}>
              <div style={{color:"#fca5a5",fontSize:11,marginBottom:3}}>⚽ ประตู:</div>
              {live.sc.map((s,i)=><div key={i} style={{fontSize:11,color:"#f1f5f9"}}>{s.min}' {s.player} ({gt(teams,s.team)?.name})</div>)}
            </div>
          )}
          {live.yc?.length>0&&(
            <div style={{marginBottom:6}}>
              <div style={{color:"#fcd34d",fontSize:11,marginBottom:3}}>🟨 ใบเหลือง:</div>
              {live.yc.map((c,i)=><div key={i} style={{fontSize:11,color:"#f1f5f9"}}>{c.min}' {c.player} ({gt(teams,c.team)?.name})</div>)}
            </div>
          )}
          {live.rc?.length>0&&(
            <div style={{marginBottom:6}}>
              <div style={{color:"#fca5a5",fontSize:11,marginBottom:3}}>🟥 ใบแดง:</div>
              {live.rc.map((c,i)=><div key={i} style={{fontSize:11,color:"#f1f5f9"}}>{c.min}' {c.player} ({gt(teams,c.team)?.name})</div>)}
            </div>
          )}

          <div style={{display:"flex",gap:6,marginTop:8}}>
            <button onClick={saveLive} style={btn("#f59e0b","#0f172a")}>💾 จบแมตช์ & บันทึก</button>
            <button onClick={()=>setLive(null)} style={btn("#6b7280")}>ยกเลิก</button>
          </div>
        </div>
      )}
      <div style={{color:"#94a3b8",fontSize:11,marginBottom:6}}>{matches.length} แมตช์ทั้งหมด</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {[...matches].sort((a,b)=>a.d.localeCompare(b.d)).map(m=>{
          const h=gt(teams,m.h),a=gt(teams,m.a);
          if(!h||!a)return null;
          return(
            <div key={m.id} style={{background:"#1e293b",borderRadius:8,padding:10,display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1}}>
                <div style={{color:"#f1f5f9",fontSize:12,fontWeight:600}}>{h.name} vs {a.name}</div>
                <div style={{fontSize:10,color:"#64748b"}}>{fd(m.d)} {m.t} - {m.st}</div>
                {m.st==="จบแล้ว"&&<div style={{fontSize:11,color:"#f59e0b",fontWeight:700}}>{m.hs}-{m.as}</div>}
              </div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>setLive({...m})} style={{...btn("#dc2626"),padding:"4px 8px",fontSize:11}}>⚡</button>
                <button onClick={()=>{setEid(m.id);setF({h:m.h,a:m.a,d:m.d,t:m.t,v:m.v,st:m.st,url:m.url||""});}} style={{...btn("#1e40af"),padding:"4px 8px",fontSize:11}}>✏️</button>
                <button onClick={()=>confirm(`ลบ ${h.name} vs ${a.name}?`,()=>setMatches(p=>p.filter(x=>x.id!==m.id)))} style={{...btn("#374151"),padding:"4px 8px",fontSize:11}}>🗑</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

        <div style={{color:"#94a3b8",fontWeight:600,marginBottom:8}}>🔄 รีเซ็ตข้อมูล</div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:10,lineHeight:1.7}}>ล้างข้อมูลเก่าและโหลด <b style={{color:"#f59e0b"}}>โป่งลีกคัพ 2569</b> ใหม่ทั้งหมด</div>
        <button onClick={onReset} style={{background:"#dc2626",color:"#fff",border:"none",borderRadius:8,padding:"10px 14px",fontWeight:700,cursor:"pointer",fontSize:12,width:"100%"}}>
          🔄 รีเซ็ตข้อมูล โป่งลีกคัพ 2569
        </button>
      </div>
    </div>
  );
}

// ── APP ──
export default function App(){
  const [matches,setMatchesRaw,mReady]=useSave("pm",MATCHES_INIT);
  const [banners,setBannersRaw,bReady]=useSave("pb",BANNERS_INIT);
  const teams=TEAMS;
  const setMatches=(v)=>setMatchesRaw(typeof v==="function"?v(matches):v);
  const setBanners=(v)=>setBannersRaw(typeof v==="function"?v(banners):v);
  if(!mReady||!bReady) return (
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:52}}>⚽</div>
      <div style={{color:"#f59e0b",fontSize:16,fontWeight:700}}>กำลังโหลดข้อมูล...</div>
      <div style={{color:"#64748b",fontSize:12}}>เชื่อมต่อ Firebase...</div>
    </div>
  );
  const [page,setPage]=useState("home");
  const [isAdmin,setIsAdmin]=useState(false);
  const [pass,setPass]=useState("");
  const [atab,setAtab]=useState("matches");
  const [conf,setConf]=useState(null);
  const ask=(msg,fn)=>setConf({msg,fn});
  const reset=()=>ask("รีเซ็ตข้อมูลทั้งหมด?",()=>{
    localStorage.removeItem("pm");localStorage.removeItem("pb");window.location.reload();
  });
  const NAV=[{k:"home",i:"🏠",l:"หน้าแรก"},{k:"fixtures",i:"📅",l:"ตาราง"},{k:"standings",i:"🏆",l:"คะแนน"},{k:"admin",i:"⚙️",l:"แอดมิน"}];
  const ATABS=[{k:"matches",i:"📅",l:"แมตช์"},{k:"banners",i:"🎯",l:"แบนเนอร์"},{k:"settings",i:"⚙️",l:"ตั้งค่า"}];
  return(
    <div style={{minHeight:"100vh",background:"#0f172a",color:"#f8fafc",fontFamily:"'Noto Sans Thai','Sarabun',sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:64}}>
      {conf&&<Confirm msg={conf.msg} onOk={()=>{conf.fn();setConf(null);}} onCancel={()=>setConf(null)}/>}
      <div style={{background:"linear-gradient(135deg,#0f172a,#1e3a5f)",padding:"10px 12px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:100,borderBottom:"1px solid #1e293b"}}>
        <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#f59e0b,#dc2626)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⚽</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>โป่งลีกคัพ 2569</div>
          <div style={{fontSize:10,color:"#64748b"}}>สนามกีฬาหน้าเทศบาลตำบลโป่ง</div>
        </div>
        {isAdmin&&<button onClick={()=>{setIsAdmin(false);setPage("home");}} style={{background:"#dc2626",color:"#fff",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:600,flexShrink:0}}>ออก</button>}
      </div>
      {page==="home"&&<Home teams={teams} matches={matches} banners={banners}/>}
      {page==="fixtures"&&<Fixtures teams={teams} matches={matches}/>}
      {page==="standings"&&<Standings teams={teams} matches={matches}/>}
      {page==="admin"&&!isAdmin&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,minHeight:380}}>
          <div style={{fontSize:48,marginBottom:14}}>🔒</div>
          <div style={{color:"#f1f5f9",fontSize:16,fontWeight:700,marginBottom:6}}>เข้าสู่ระบบแอดมิน</div>
          <div style={{color:"#64748b",fontSize:12,marginBottom:18}}>รหัส: admin1234</div>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(pass==="admin1234"?setIsAdmin(true):alert("รหัสผิด"))}
            placeholder="รหัสผ่าน" style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"11px 16px",color:"#f1f5f9",fontSize:14,outline:"none",width:230,textAlign:"center",marginBottom:12}}/>
          <button onClick={()=>pass==="admin1234"?setIsAdmin(true):alert("รหัสผิด")}
            style={{background:"#f59e0b",color:"#0f172a",border:"none",borderRadius:10,padding:"11px 32px",fontWeight:800,fontSize:14,cursor:"pointer",width:230}}>เข้าสู่ระบบ</button>
        </div>
      )}
      {page==="admin"&&isAdmin&&(
        <div>
          <div style={{display:"flex",background:"#0f172a",borderBottom:"1px solid #1e293b"}}>
            {ATABS.map(n=>(
              <button key={n.k} onClick={()=>setAtab(n.k)} style={{flex:1,padding:"9px 4px",background:"none",border:"none",borderBottom:atab===n.k?"2px solid #f59e0b":"2px solid transparent",color:atab===n.k?"#f59e0b":"#64748b",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                <div style={{fontSize:15}}>{n.i}</div>{n.l}
              </button>
            ))}
          </div>
          {atab==="matches"&&<AdminMatches teams={teams} matches={matches} setMatches={setMatches} confirm={ask}/>}
          {atab==="banners"&&<AdminBanners banners={banners} setBanners={setBanners} confirm={ask}/>}
          {atab==="settings"&&<AdminSettings onReset={reset}/>}
        </div>
      )}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#0f172a",borderTop:"1px solid #1e293b",display:"flex",zIndex:200}}>
        {NAV.map(n=>(
          <button key={n.k} onClick={()=>setPage(n.k)} style={{flex:1,padding:"7px 2px 9px",background:"none",border:"none",borderTop:page===n.k?"2px solid #f59e0b":"2px solid transparent",color:page===n.k?"#f59e0b":"#64748b",fontSize:10,fontWeight:600,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
            <span style={{fontSize:18}}>{n.i}</span>{n.l}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
